name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: |
          pip install py-clob-client pysocks requests
          sudo apt-get update -qq && sudo apt-get install -y -qq tor 2>&1 | tail -3
          
      - name: Start Tor
        run: |
          sudo tor --SocksPort 19050 --ExitNodes {jp},{kr},{hk} &
          sleep 15
          
      - name: Execute trade
        env:
          PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python trade.py

name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install deps
        run: |
          npm init -y
          npm install @polymarket/clob-client global-agent
          sudo apt-get update -qq && sudo apt-get install -y -qq tor 2>&1 | tail -3
          
      - name: Start Tor
        run: |
          sudo tor --SocksPort 19050 --ExitNodes {jp},{kr},{hk} &
          sleep 20
          echo "✅ Tor started"
          
      - name: Execute trade
        env:
          PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          API_KEY: ${{ secrets.POLY_API_KEY }}
          NODE_OPTIONS: '-r global-agent/bootstrap'
          GLOBAL_AGENT_HTTPS_PROXY: socks5://127.0.0.1:19050
          GLOBAL_AGENT_HTTP_PROXY: socks5://127.0.0.1:19050
        run: node trade.js

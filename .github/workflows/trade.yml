name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: pip install py-clob-client
          
      - name: Execute trade
        env:
          PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python trade.py

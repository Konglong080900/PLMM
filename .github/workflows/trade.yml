name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install polytown
        run: |
          npm install -g polytown 2>&1
          echo "=== which polytown ==="
          which polytown 2>&1 || echo "not found"
          echo "=== npm root -g ==="
          npm root -g
          ls "$(npm root -g)/polytown" 2>&1 || echo "no polytown dir"
          
      - name: Place order
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          npx --yes polytown clob create-order \
            --token 101163338685857975456381241657395646973932529603300193676223177504175672414916 \
            --side BUY \
            --price 0.04 \
            --size 125

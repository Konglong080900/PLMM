name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trade
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          pip install -q py-clob-client-v2 2>&1
          python trade.py

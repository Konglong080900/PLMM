name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          
      - name: Install deps
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun init -y
          bun add @polymarket/clob-client
          
      - name: Place order
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run trade.ts

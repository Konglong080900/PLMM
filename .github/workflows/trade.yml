name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun + deps
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          export PATH="$HOME/.bun/bin:$PATH"
          cd $GITHUB_WORKSPACE
          npm init -y 2>/dev/null
          npm install @polymarket/clob-client
          
      - name: Trade
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          POLYMARKET_API_KEY: ${{ secrets.API_KEY }}
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          cd $GITHUB_WORKSPACE
          bun run trade.ts

name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bun + polytown
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g polytown
          
      - name: Setup wallet
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx polytown setup -y 2>&1
          
      - name: Place order
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx polytown clob create-order \
            --token 101163338685857975456381241657395646973932529603300193676223177504175672414916 \
            --side BUY \
            --price 0.04 \
            --size 125

name: Test
on: push
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - run: pip install -q hermes-pmxt
      - env:
          K: ${{ secrets.POLY_PRIVATE_KEY }}
        run: |
          python3 -c "
          import sys, time, json
          from hermes_pmxt import pmxt_server_start, pmxt_server_status
          pmxt_server_start()
          for _ in range(30):
              if pmxt_server_status().get('data',{}).get('running'): break
              time.sleep(2)
          else:
              sys.stderr.write('FAIL\n'); exit(1)
          sys.stderr.write('OK\n')
          "

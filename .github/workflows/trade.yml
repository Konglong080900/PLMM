name: Polymarket Auto Trade

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup
        run: |
          npm init -y 2>/dev/null
          npm install @polymarket/clob-client viem
          
      - name: Trade
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLY_PRIVATE_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node trade.mjs
